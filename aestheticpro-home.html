<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f0e8;
  --cream-dark: #ede6d8;
  --cream-deep: #e0d5c0;
  --white: #ffffff;
  --gold: #c4a35a;
  --gold-dark: #a8893e;
  --gold-light: #faf3e4;
  --gold-border: #e0c98a;
  --gold-pale: #fdf8ee;
  --brown: #6b5a3a;
  --brown-light: #8a7455;
  --brown-pale: #f5ede0;
  --text-dark: #2c2318;
  --text-mid: #6b5a3a;
  --text-light: #a08c6e;
  --border: rgba(107,90,58,0.12);
  --border-mid: rgba(107,90,58,0.22);
  --border-gold: rgba(196,163,90,0.35);
  --red: #8a2020; --red-light: #faeaea; --red-border: #e8a09a;
  --blue: #2a4a7a; --blue-light: #e8eef8;
  --green: #3a5a28; --green-light: #edf5e4;
}

html, body { min-height:100%; font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text-dark); }

/* ── TOPBAR ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border-gold);
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; position: sticky; top: 0; z-index: 100;
}
.tb-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 600;
  color: var(--brown); letter-spacing: 1px;
}
.tb-brand span { color: var(--gold); }
.tb-right { display: flex; align-items: center; gap: 10px; }

/* Selector de sede */
.sede-selector {
  display: flex; align-items: center; gap: 0;
  background: var(--cream); border: 1px solid var(--border-gold);
  border-radius: 8px; padding: 3px; overflow: hidden;
}
.sede-btn {
  font-size: 11px; padding: 5px 12px;
  border: none; background: transparent;
  color: var(--text-light); cursor: pointer;
  border-radius: 6px; font-family: 'DM Sans', sans-serif;
  transition: all .15s; white-space: nowrap;
}
.sede-btn.on {
  background: var(--gold); color: var(--white);
  font-weight: 500;
}
.sede-btn:hover:not(.on) { color: var(--brown); }

.tb-user { display: flex; align-items: center; gap: 8px; }
.tb-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gold-light); border: 1.5px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--brown); flex-shrink: 0;
}
.tb-name { font-size: 12px; color: var(--text-mid); font-weight: 500; }
.tb-logout {
  background: none; border: none; cursor: pointer;
  color: var(--text-light); display: flex; align-items: center;
  padding: 6px; border-radius: 7px; transition: all .15s;
}
.tb-logout:hover { background: var(--cream-dark); color: var(--brown); }

/* ── HERO ── */
.hero {
  background: var(--white);
  border-bottom: 1px solid var(--border-gold);
  padding: 28px 28px 32px;
}
.hero-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.hero-left {}
.hero-greeting { font-size: 12px; color: var(--text-light); margin-bottom: 3px; letter-spacing: 0.3px; }
.hero-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: var(--text-dark); margin-bottom: 6px; }
.hero-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.role-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.rp-gerente  { background: var(--gold-light); color: var(--brown); border: 1px solid var(--gold-border); }
.rp-admin    { background: var(--cream-dark); color: var(--brown); border: 1px solid var(--border-gold); }
.rp-empleado { background: var(--cream); color: var(--text-mid); border: 1px solid var(--border-mid); }
.sede-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; color: var(--gold-dark); background: var(--gold-pale); border: 1px solid var(--gold-border); }
.sede-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
.hero-fecha { font-size: 11px; color: var(--text-light); margin-top: 2px; }

.hero-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.hstat {
  background: var(--cream); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 12px 18px; min-width: 100px;
}
.hstat-val { font-size: 22px; font-weight: 500; color: var(--text-dark); line-height: 1; font-family: 'Cormorant Garamond', serif; }
.hstat-lbl { font-size: 10px; color: var(--text-light); margin-top: 3px; }
.hstat-warn .hstat-val { color: #b05030; }
.hstat-ok   .hstat-val { color: var(--green); }
.hstat-gold .hstat-val { color: var(--gold-dark); }

/* ── PAGE ── */
.page { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }

.sec-title {
  font-size: 10px; font-weight: 500; color: var(--text-light);
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 12px; margin-top: 28px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title::after { content:''; flex:1; height:0.5px; background:var(--border-gold); }
.sec-title:first-child { margin-top: 0; }

/* ── QUICK ACTIONS ── */
.qa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.qa-btn {
  background: var(--white); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 11px 14px;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text-dark); font-family: 'DM Sans', sans-serif;
  transition: all .15s; text-align: left;
}
.qa-btn:hover { background: var(--gold-pale); border-color: var(--gold); color: var(--brown); }
.qa-btn:active { transform: scale(0.97); }
.qa-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ── MODULE GRID ── */
.mod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; }

.mod-card {
  background: var(--white); border: 1px solid var(--border-gold);
  border-radius: 14px; padding: 18px 16px 14px;
  cursor: pointer; transition: all .15s;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; overflow: hidden; user-select: none;
}
.mod-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(196,163,90,0.15); }
.mod-card:active { transform: scale(0.98); }
.mod-card.locked {
  background: var(--cream); cursor: not-allowed; opacity: 0.45;
  border-color: var(--border-mid);
}
.mod-card.locked:hover { border-color: var(--border-mid); transform: none; box-shadow: none; }

.mod-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mod-name { font-size: 13px; font-weight: 500; color: var(--text-dark); line-height: 1.3; }
.mod-desc { font-size: 11px; color: var(--text-light); line-height: 1.4; }

.mod-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 20px;
  background: var(--gold); color: var(--white);
}
.mod-badge.red { background: var(--red); }
.mod-lock { position: absolute; top: 12px; right: 12px; color: var(--text-light); }

/* ── ALERTAS ── */
.alert-list { display: flex; flex-direction: column; gap: 8px; }
.alert-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 11px 14px;
  transition: border-color .15s;
}
.alert-row:hover { border-color: var(--gold); }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.alert-t { font-size: 12px; font-weight: 500; color: var(--text-dark); }
.alert-s { font-size: 11px; color: var(--text-light); margin-top: 1px; }
.alert-time { font-size: 10px; color: var(--text-light); margin-left: auto; white-space: nowrap; }

/* ── SEDE MODAL ── */
.sede-modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(44,35,24,0.35);
  z-index: 200; align-items: center; justify-content: center;
}
.sede-modal-bg.show { display: flex; }
.sede-modal {
  background: var(--white); border-radius: 16px;
  border: 1px solid var(--border-gold);
  padding: 28px 32px; max-width: 340px; width: 90%;
  text-align: center;
}
.sede-modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--text-dark); margin-bottom: 6px; }
.sede-modal-sub { font-size: 12px; color: var(--text-light); margin-bottom: 24px; }
.sede-options { display: flex; flex-direction: column; gap: 10px; }
.sede-opt {
  background: var(--cream); border: 1px solid var(--border-gold);
  border-radius: 10px; padding: 14px 18px;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; font-weight: 500; color: var(--text-dark);
}
.sede-opt:hover { background: var(--gold-pale); border-color: var(--gold); color: var(--brown); }
.sede-opt-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.sede-opt-sub { font-size: 11px; color: var(--text-light); font-weight: 400; margin-left: auto; }

@media (max-width: 640px) {
  .topbar { padding: 0 16px; }
  .hero { padding: 20px 16px 24px; }
  .page { padding: 20px 16px 48px; }
  .mod-grid { grid-template-columns: repeat(2, 1fr); }
  .hero-inner { flex-direction: column; gap: 16px; }
  .hero-stats { width: 100%; }
  .tb-name { display: none; }
  .sede-selector { display: none; }
}
</style>
</head>

      icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>' }

      icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' },
    { label:'Bitácora del día',  mod:'bitacora',    color:'#f5ede0', ic:'#6b5a3a',
      icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' }
  ]
};

/* ═══════════════════════════════════════
   ALERTAS
═══════════════════════════════════════ */
var ALERTS_DATA = {
  'Bogotá': [
    { dot:'#e08060', t:'Gasto vence en 3 días',    s:'Arriendo Bogotá · $1.8M · vence 3 jun',        time:'hoy',     roles:['Gerente','Administradora jefe'] },
    { dot:'#c4a35a', t:'Nuevo agendamiento',        s:'Camila Torres · Instagram · Depilación láser',  time:'10:32am', roles:['Gerente','Administradora jefe','Empleada'] },
    { dot:'#e08060', t:'Tarea vencida',             s:'Confirmar citas · asignada a ti',               time:'hace 2h', roles:['Empleada'] },
    { dot:'#c4a35a', t:'Meta mensual al 77%',       s:'Pacientes atendidos · 231 de 300',              time:'hoy',     roles:['Gerente','Administradora jefe'] }
  ],
  'Pereira': [
    { dot:'#c04040', t:'Sin stock — insumos',       s:'Sérum vitamina C · 0 unidades · Pereira',       time:'ayer',    roles:['Gerente','Administradora jefe','Empleada'] },
    { dot:'#c4a35a', t:'Nuevo agendamiento',        s:'María Pérez · WhatsApp · Radiofrecuencia',       time:'9:15am',  roles:['Gerente','Administradora jefe'] },
    { dot:'#c4a35a', t:'Meta mensual al 65%',       s:'Pacientes atendidos · 130 de 200',               time:'hoy',     roles:['Gerente','Administradora jefe'] }
  ]
};
var ALERTS = ALERTS_DATA['Bogotá'];

/* ═══════════════════════════════════════
   ESTADO
═══════════════════════════════════════ */
var currentUser = null;
var currentSede = null;

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
window.onload = function () {
  /* Si no hay sesión activa, volver al login */
  /* Si no hay sesión, usar demo (Laura Pineda gerente) para desarrollo */
  var email = sessionStorage.getItem('ap_email') || 'laupineda@laserhouse.co';
  currentUser = USERS[email] || USERS['laupineda@laserhouse.co'];
  /* Si la empleada no tiene la sede guardada, asignarla de su perfil */
  if (!sessionStorage.getItem('ap_sede') && currentUser.sedes.length === 1) {
    sessionStorage.setItem('ap_sede', currentUser.sedes[0]);
  }

  /* Si solo tiene una sede la asignamos directo, si tiene varias mostramos modal */
  if (currentUser.sedes.length === 1) {
    /* Empleada con sede fija — no pregunta */
    currentSede = currentUser.sedes[0];
    sessionStorage.setItem('ap_sede', currentSede);
    render();
  } else {
    /* Gerente/admin — revisar si ya eligió sede antes */
    var sedePrev = sessionStorage.getItem('ap_sede');
    if (sedePrev && currentUser.sedes.indexOf(sedePrev) !== -1) {
      currentSede = sedePrev;
      render();
    } else {
      showSedeModal();
    }
  }
};

/* ═══════════════════════════════════════
   MODAL DE SEDE
═══════════════════════════════════════ */
function showSedeModal() {
  var modal = document.getElementById('sede-modal');
  var opts  = document.getElementById('modal-options');
  opts.innerHTML = '';

  currentUser.sedes.forEach(function (s) {
    var btn = document.createElement('button');
    btn.className = 'sede-opt';
    btn.innerHTML =
      '<div class="sede-opt-dot"></div>' +
      '<span>Sede ' + s + '</span>' +
      '<span class="sede-opt-sub">Trabajar desde aquí</span>';
    btn.onclick = function () {
      currentSede = s;
      sessionStorage.setItem('ap_sede', s);
      document.getElementById('sede-modal').classList.remove('show');
      render();
    };
    opts.appendChild(btn);
  });

  modal.classList.add('show');
}

/* ═══════════════════════════════════════
   RENDER PRINCIPAL
═══════════════════════════════════════ */
function render() {
  var u = currentUser;
  var isAlto = u.role !== 'Empleada';

  /* Fecha */
  var d = new Date();
  var dias   = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var meses  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var fechaStr = dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()];
  var h = d.getHours();
  var greeting = h < 12 ? 'Buenos días,' : h < 18 ? 'Buenas tardes,' : 'Buenas noches,';

  /* Topbar */
  document.getElementById('tb-av').textContent   = u.initials;
  document.getElementById('tb-name').textContent = u.name;

  /* Selector de sede en topbar (si tiene más de una) */
  var sel = document.getElementById('sede-selector');
  sel.innerHTML = '';
  if (u.sedes.length > 1) {
    u.sedes.forEach(function (s) {
      var b = document.createElement('button');
      b.className = 'sede-btn' + (s === currentSede ? ' on' : '');
      b.textContent = s;
      b.onclick = function () {
        currentSede = s;
        sessionStorage.setItem('ap_sede', s);
        document.querySelectorAll('.sede-btn').forEach(function(x){ x.classList.remove('on'); });
        b.classList.add('on');
        actualizarSede();
      };
      sel.appendChild(b);
    });
  }

  /* Hero */
  document.getElementById('hero-greeting').textContent = greeting;
  document.getElementById('hero-name').textContent     = u.name;
  document.getElementById('hero-fecha').textContent    = fechaStr;
  var roleEl = document.getElementById('hero-role');
  roleEl.textContent = u.role;
  roleEl.className   = 'role-pill ' + u.roleClass;
  actualizarSede();

  /* Stats hero */
  var statsEl = document.getElementById('hero-stats');
  if (isAlto) {
    statsEl.innerHTML =
      '<div class="hstat hstat-warn"><div class="hstat-val">2</div><div class="hstat-lbl">Gastos por vencer</div></div>' +
      '<div class="hstat hstat-gold"><div class="hstat-val">$1.84M</div><div class="hstat-lbl">Ingresos hoy</div></div>' +
      '<div class="hstat"><div class="hstat-val">7</div><div class="hstat-lbl">Agendados hoy</div></div>' +
      '<div class="hstat hstat-warn"><div class="hstat-val">5</div><div class="hstat-lbl">Tareas pendientes</div></div>';
  } else {
    statsEl.innerHTML =
      '<div class="hstat hstat-warn"><div class="hstat-val">5</div><div class="hstat-lbl">Tareas pendientes</div></div>' +
      '<div class="hstat"><div class="hstat-val">3</div><div class="hstat-lbl">Pacientes por llamar</div></div>' +
      '<div class="hstat hstat-ok"><div class="hstat-val">OK</div><div class="hstat-lbl">Asistencia hoy</div></div>';
  }

  /* Acciones rápidas */
  var qaList = isAlto ? QUICK.alto : QUICK.bajo;
  var qaGrid = document.getElementById('qa-grid');
  qaGrid.innerHTML = '';
  qaList.forEach(function (q) {
    if (!u.perms[q.mod]) return;
    var btn = document.createElement('button');
    btn.className = 'qa-btn';
    btn.onclick   = function () { goModule(q.mod); };
    btn.innerHTML =
      '<div class="qa-icon" style="background:' + q.color + ';color:' + q.ic + '">' + q.icon + '</div>' + q.label;
    qaGrid.appendChild(btn);
  });

  /* Módulos */
  var modGrid = document.getElementById('mod-grid');
  modGrid.innerHTML = '';
  MODULES.forEach(function (m) {
    var allowed = !!u.perms[m.id];
    var card = document.createElement('div');
    card.className = 'mod-card' + (allowed ? '' : ' locked');
    if (allowed) card.onclick = function () { goModule(m.id); };

    var badgeHtml = (allowed && m.badge)
      ? '<div class="mod-badge' + (m.badgeRed ? ' red' : '') + '">' + m.badge + '</div>'
      : '';
    var lockHtml = allowed ? '' :
      '<div class="mod-lock"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>';

    card.innerHTML =
      badgeHtml + lockHtml +
      '<div class="mod-icon" style="background:' + m.color + ';color:' + m.ic + '">' + m.icon + '</div>' +
      '<div><div class="mod-name">' + m.name + '</div><div class="mod-desc">' + m.desc + '</div></div>';

    modGrid.appendChild(card);
  });

  /* Alertas filtradas por sede */
  ALERTS = (ALERTS_DATA[currentSede] || ALERTS_DATA['Bogotá']);
  var alertList = document.getElementById('alert-list');
  alertList.innerHTML = '';
  var shown = 0;
  ALERTS.forEach(function (a) {
    if (a.roles.indexOf(u.role) === -1 || shown >= 4) return;
    shown++;
    var row = document.createElement('div');
    row.className = 'alert-row';
    row.innerHTML =
      '<div class="alert-dot" style="background:' + a.dot + '"></div>' +
      '<div style="flex:1"><div class="alert-t">' + a.t + '</div><div class="alert-s">' + a.s + '</div></div>' +
      '<div class="alert-time">' + a.time + '</div>';
    alertList.appendChild(row);
  });
  if (shown === 0) {
    alertList.innerHTML = '<div style="font-size:12px;color:var(--text-light);padding:12px 0">Sin alertas por ahora. ¡Todo en orden!</div>';
  }
}

/* ═══════════════════════════════════════
   ACTUALIZAR SEDE (sin re-renderizar todo)
═══════════════════════════════════════ */
function actualizarSede() {
  document.getElementById('hero-sede-txt').textContent =
    currentSede === 'Todas' ? 'Todas las sedes' : 'Sede ' + currentSede;
}

/* ═══════════════════════════════════════
   NAVEGACIÓN
═══════════════════════════════════════ */
function goModule(id) {
  /* Archivos ya construidos */
  var rutas = {
    asistencia: 'asistencia.html'
  };
  /* Módulos aún en construcción */
  var proximos = {
    dashboard:'Dashboard', responding:'Responding', pacientes:'Pacientes',
    tareas:'Tareas', metas:'Metas', gamif:'Gamificación', bitacora:'Bitácora',
    compras:'Compras e insumos', gastos:'Gastos por sede',
    finanzas:'Finanzas', perfiles:'Perfiles'
  };
  if (rutas[id]) {
    window.location.href = rutas[id];
  } else {
    alert('Módulo "' + (proximos[id]||id) + '" en construcción.\nEstaremos agregándolo pronto.');
  }
}

function logout() {
  sessionStorage.clear();
  window.location.href = 'aestheticpro-login.html';
}
</script>
